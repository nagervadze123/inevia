services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fullbuild
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  backend:
    build: ./backend
    env_file: .env
    environment:
      - PYTHONPATH=/app
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
    volumes: ["./backend:/app", "./data:/data"]
    command: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./backend
    env_file: .env
    environment:
      - PYTHONPATH=/app
    depends_on: [backend, redis]
    volumes: ["./backend:/app", "./data:/data"]
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [backend]

volumes:
  pgdata:
